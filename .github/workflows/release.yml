name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Bun
              uses: oven-sh/setup-bun@v2

            - name: Build plugin
              run: |
                  bun install --frozen-lockfile
                  bun run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  tag_lower="${tag,,}"
                  release_flags=()

                  if [[ "$tag_lower" == *alpha* || "$tag_lower" == *beta* ]]; then
                    release_flags+=(--prerelease)
                  elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    release_flags+=()
                  else
                    release_flags+=(--draft)
                  fi

                  gh release create "$tag" \
                    --title="$tag" \
                    "${release_flags[@]}" \
                    --generate-notes \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
